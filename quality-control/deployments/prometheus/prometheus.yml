global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "netie-edge-inference"
    metrics_path: /metrics
    static_configs:
      - targets: ["netie-inference:8000"]
        labels:
          service: inference
          environment: production

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
