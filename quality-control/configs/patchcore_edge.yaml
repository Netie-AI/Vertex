# ==============================================================================
# Netie AI — Edge-Native Quality Control Pipeline
# ==============================================================================
# This config trains a PatchCore model on "golden" surface images.
# Place defect-free images in ./data/sample_dataset/good/train/
# Docs: https://anomalib.readthedocs.io/

dataset:
  name: Folder
  root: ./data/sample_dataset/
  normal_dir: good/train
  abnormal_dir: good/test_defect   # optional — leave empty for pure unsupervised
  normal_test_dir: good/test_good
  task: segmentation               # 'classification' or 'segmentation'
  image_size: [256, 256]
  train_batch_size: 32
  eval_batch_size: 32
  num_workers: 4

model:
  name: Patchcore
  backbone: wide_resnet50_2
  pre_trained: true
  layers_to_extract:
    - layer2
    - layer3
  coreset_sampling_ratio: 0.1       # % of features kept in memory bank
  num_neighbors: 9

metrics:
  image:
    - AUROC
    - F1Score
  pixel:
    - AUROC
    - F1Score

trainer:
  accelerator: gpu
  devices: 1
  max_epochs: 1                     # PatchCore is single-pass; 1 epoch is standard
  precision: 32
  default_root_dir: ./results/patchcore

export:
  onnx:
    opset_version: 17
    input_shape: [1, 3, 256, 256]
  tensorrt:
    precision: fp16                 # 'fp16' or 'int8'
    max_workspace_size_gb: 4
    engine_output: ./results/patchcore/weights/model.engine
